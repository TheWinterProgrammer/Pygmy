<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — Pygmy</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: hsl(228, 4%, 10%);
      color: #e2e8f0;
      font-family: 'Poppins', system-ui, sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .card {
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 1.5rem;
      padding: 3rem 2.5rem;
      max-width: 420px;
      text-align: center;
      backdrop-filter: blur(16px);
    }
    .icon { font-size: 3.5rem; margin-bottom: 1.25rem; }
    h1 { font-size: 1.5rem; margin-bottom: .75rem; }
    p { color: #888; font-size: .95rem; line-height: 1.6; margin-bottom: 1.5rem; }
    button {
      background: hsl(355, 70%, 58%);
      border: none;
      border-radius: .75rem;
      color: white;
      font-size: .95rem;
      font-weight: 600;
      padding: .75rem 2rem;
      cursor: pointer;
    }
    button:hover { filter: brightness(1.1); }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>You're offline</h1>
    <p>It looks like you've lost your internet connection. Check your network and try again.</p>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
